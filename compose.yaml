name: coderacer

services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  mailpit:
    image: axllent/mailpit:v1.30.4
    ports:
      - "${MAILPIT_SMTP_PORT}:1025"
      - "${MAILPIT_UI_PORT}:8025"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    environment:
      POSTGRES_HOST: database
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE}
      APP_EMAIL_DELIVERY_MODE: ${APP_EMAIL_DELIVERY_MODE}
      APP_EMAIL_FROM: ${APP_EMAIL_FROM}
      APP_EMAIL_VERIFICATION_URL: ${APP_EMAIL_VERIFICATION_URL}
      APP_EMAIL_VERIFICATION_TOKEN_TTL: ${APP_EMAIL_VERIFICATION_TOKEN_TTL}
      APP_EMAIL_VERIFICATION_RESEND_COOLDOWN: ${APP_EMAIL_VERIFICATION_RESEND_COOLDOWN}
      APP_PASSWORD_RESET_URL: ${APP_PASSWORD_RESET_URL}
      APP_PASSWORD_RESET_TOKEN_TTL: ${APP_PASSWORD_RESET_TOKEN_TTL}
      APP_PASSWORD_RESET_RESEND_COOLDOWN: ${APP_PASSWORD_RESET_RESEND_COOLDOWN}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_JWT_ACCESS_TOKEN_TTL: ${APP_JWT_ACCESS_TOKEN_TTL}
      APP_ADMIN_BOOTSTRAP_ENABLED: ${APP_ADMIN_BOOTSTRAP_ENABLED}
      APP_ADMIN_EMAIL: ${APP_ADMIN_EMAIL}
      APP_ADMIN_USERNAME: ${APP_ADMIN_USERNAME}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD}
      APP_AI_ENABLED: ${APP_AI_ENABLED}
      APP_AI_API_KEY: ${APP_AI_API_KEY}
      APP_AI_BASE_URL: ${APP_AI_BASE_URL}
      APP_AI_MODEL_ID: ${APP_AI_MODEL_ID}

    depends_on:
      database:
        condition: service_healthy
      mailpit:
        condition: service_started

  frontend:
    image: node:22-alpine
    working_dir: /workspace/frontend
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    ports:
      - "${FRONTEND_PORT}:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING}
    volumes:
      - ./frontend:/workspace/frontend
      - frontend-node-modules:/workspace/frontend/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres-data:
  frontend-node-modules:
