name: coderacer

services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-code_racer}
      POSTGRES_USER: ${POSTGRES_USER:-code_racer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-code_racer} -d ${POSTGRES_DB:-code_racer}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  mailpit:
    image: axllent/mailpit:v1.30.4
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    environment:
      POSTGRES_HOST: database
      POSTGRES_DB: ${POSTGRES_DB:-code_racer}
      POSTGRES_USER: ${POSTGRES_USER:-code_racer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      APP_EMAIL_DELIVERY_MODE: smtp
      APP_EMAIL_FROM: ${APP_EMAIL_FROM:-no-reply@coderacer.local}
      APP_EMAIL_VERIFICATION_URL: ${APP_EMAIL_VERIFICATION_URL:-http://localhost:5173/verify-email}
      APP_PASSWORD_RESET_URL: ${APP_PASSWORD_RESET_URL:-http://localhost:5173/reset-password}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-}
      APP_ADMIN_BOOTSTRAP_ENABLED: ${APP_ADMIN_BOOTSTRAP_ENABLED:-false}
      APP_ADMIN_EMAIL: ${APP_ADMIN_EMAIL:-}
      APP_ADMIN_USERNAME: ${APP_ADMIN_USERNAME:-}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:-}

    depends_on:
      database:
        condition: service_healthy
      mailpit:
        condition: service_started

  frontend:
    image: node:22-alpine
    working_dir: /workspace/frontend
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
    volumes:
      - ./frontend:/workspace/frontend
      - frontend-node-modules:/workspace/frontend/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres-data:
  frontend-node-modules:
