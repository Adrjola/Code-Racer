name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    name: backend-quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run backend quality checks
        run: ./gradlew clean check

  frontend-quality:
    name: frontend-quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend tests and check coverage
        run: npm run test:coverage -- --reporter=default --reporter=junit --outputFile.junit=reports/vitest.junit.xml

      - name: Check frontend formatting
        run: npm run format:check

      - name: Build frontend
        run: npm run build

      - name: Upload frontend test reports
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: frontend-test-reports
          path: |
            frontend/coverage
            frontend/reports
          if-no-files-found: ignore
          retention-days: 7
