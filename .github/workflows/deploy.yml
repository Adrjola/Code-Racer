name: Deploy to Self-Hosted Runner

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  docker-build-check:
    name: docker-build-check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build application image
        shell: bash
        run: docker build --pull -t code-racer-pr-check:${{ github.sha }} .

  deploy:
    name: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    environment:
      name: production
    env:
      APP_CONTAINER_NAME: code-racer-app
      APP_IMAGE_NAME: code-racer-app
      APP_NETWORK_NAME: code-racer-net
      DB_CONTAINER_NAME: code-racer-postgres
      DB_VOLUME_NAME: code-racer-postgres-data
      POSTGRES_DB: ${{ vars.POSTGRES_DB }}
      POSTGRES_USER: ${{ vars.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      MAIL_HOST: ${{ vars.MAIL_HOST }}
      MAIL_PORT: ${{ vars.MAIL_PORT }}
      MAIL_USERNAME: ${{ vars.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      MAIL_SMTP_AUTH: ${{ vars.MAIL_SMTP_AUTH }}
      MAIL_SMTP_STARTTLS_ENABLE: ${{ vars.MAIL_SMTP_STARTTLS_ENABLE }}
      APP_EMAIL_FROM: ${{ vars.APP_EMAIL_FROM }}
      APP_EMAIL_VERIFICATION_URL: ${{ vars.APP_EMAIL_VERIFICATION_URL }}
      APP_EMAIL_VERIFICATION_TOKEN_TTL: ${{ vars.APP_EMAIL_VERIFICATION_TOKEN_TTL }}
      APP_EMAIL_VERIFICATION_RESEND_COOLDOWN: ${{ vars.APP_EMAIL_VERIFICATION_RESEND_COOLDOWN }}
      APP_PASSWORD_RESET_URL: ${{ vars.APP_PASSWORD_RESET_URL }}
      APP_PASSWORD_RESET_TOKEN_TTL: ${{ vars.APP_PASSWORD_RESET_TOKEN_TTL }}
      APP_PASSWORD_RESET_RESEND_COOLDOWN: ${{ vars.APP_PASSWORD_RESET_RESEND_COOLDOWN }}
      APP_JWT_SECRET: ${{ secrets.APP_JWT_SECRET }}
      APP_JWT_ACCESS_TOKEN_TTL: ${{ vars.APP_JWT_ACCESS_TOKEN_TTL }}
      ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
      APP_ADMIN_BOOTSTRAP_ENABLED: ${{ vars.APP_ADMIN_BOOTSTRAP_ENABLED }}
      APP_ADMIN_EMAIL: ${{ vars.APP_ADMIN_EMAIL }}
      APP_ADMIN_USERNAME: ${{ vars.APP_ADMIN_USERNAME }}
      APP_ADMIN_PASSWORD: ${{ secrets.APP_ADMIN_PASSWORD }}
      APP_AI_ENABLED: ${{ vars.APP_AI_ENABLED }}
      APP_AI_API_KEY: ${{ secrets.APP_AI_API_KEY }}
      APP_AI_BASE_URL: ${{ vars.APP_AI_BASE_URL }}
      APP_AI_MODEL_ID: ${{ vars.APP_AI_MODEL_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate deployment configuration
        shell: bash
        run: |
          REQUIRED_VARS=(
            POSTGRES_DB
            POSTGRES_USER
            POSTGRES_PASSWORD
            MAIL_HOST
            MAIL_PORT
            MAIL_USERNAME
            MAIL_PASSWORD
            MAIL_SMTP_AUTH
            MAIL_SMTP_STARTTLS_ENABLE
            APP_EMAIL_FROM
            APP_EMAIL_VERIFICATION_URL
            APP_EMAIL_VERIFICATION_TOKEN_TTL
            APP_EMAIL_VERIFICATION_RESEND_COOLDOWN
            APP_PASSWORD_RESET_URL
            APP_PASSWORD_RESET_TOKEN_TTL
            APP_PASSWORD_RESET_RESEND_COOLDOWN
            APP_JWT_SECRET
            APP_JWT_ACCESS_TOKEN_TTL
            ALLOWED_ORIGINS
            APP_ADMIN_BOOTSTRAP_ENABLED
            APP_AI_ENABLED
            APP_AI_API_KEY
            APP_AI_BASE_URL
            APP_AI_MODEL_ID
          )

          MISSING=0
          for VAR_NAME in "${REQUIRED_VARS[@]}"; do
            if [ -z "${!VAR_NAME}" ]; then
              echo "::error::$VAR_NAME GitHub Environment value is required for deployment"
              MISSING=1
            fi
          done

          if [ "$MISSING" -ne 0 ]; then
            exit 1
          fi

      - name: Build application image
        shell: bash
        run: |
          docker build --pull \
            -t "$APP_IMAGE_NAME:$GITHUB_SHA" \
            -t "$APP_IMAGE_NAME:latest" \
            .

      - name: Prepare private Docker network
        shell: bash
        run: |
          docker network inspect "$APP_NETWORK_NAME" >/dev/null 2>&1 || \
            docker network create "$APP_NETWORK_NAME"

      - name: Start PostgreSQL container
        shell: bash
        run: |
          docker volume create "$DB_VOLUME_NAME" >/dev/null

          if docker ps -a --format '{{.Names}}' | grep -qx "$DB_CONTAINER_NAME"; then
            docker start "$DB_CONTAINER_NAME" >/dev/null || true
          else
            docker run -d \
              --name "$DB_CONTAINER_NAME" \
              --network "$APP_NETWORK_NAME" \
              --restart unless-stopped \
              -v "$DB_VOLUME_NAME:/var/lib/postgresql/data" \
              -e POSTGRES_DB \
              -e POSTGRES_USER \
              -e POSTGRES_PASSWORD \
              postgres:17-alpine
          fi

          if ! docker inspect "$DB_CONTAINER_NAME" --format '{{json .NetworkSettings.Networks}}' | grep -q "\"$APP_NETWORK_NAME\""; then
            docker network connect "$APP_NETWORK_NAME" "$DB_CONTAINER_NAME"
          fi

      - name: Wait for PostgreSQL
        shell: bash
        run: |
          for i in {1..30}; do
            if docker exec "$DB_CONTAINER_NAME" pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"; then
              echo "PostgreSQL is ready"
              exit 0
            fi

            echo "Attempt $i: waiting for PostgreSQL..."
            sleep 2
          done

          echo "::error::PostgreSQL did not become ready"
          docker logs "$DB_CONTAINER_NAME" || true
          exit 1

      - name: Stop existing application
        shell: bash
        run: |
          docker rm -f "$APP_CONTAINER_NAME" >/dev/null 2>&1 || true
          sleep 2

      - name: Start application container
        shell: bash
        run: |
          docker run -d \
            --name "$APP_CONTAINER_NAME" \
            --network "$APP_NETWORK_NAME" \
            --restart unless-stopped \
            -p 3600:8080 \
            -e SPRING_PROFILES_ACTIVE=prod \
            -e POSTGRES_HOST="$DB_CONTAINER_NAME" \
            -e POSTGRES_PORT=5432 \
            -e POSTGRES_DB \
            -e POSTGRES_USER \
            -e POSTGRES_PASSWORD \
            -e MAIL_HOST \
            -e MAIL_PORT \
            -e MAIL_USERNAME \
            -e MAIL_PASSWORD \
            -e MAIL_SMTP_AUTH \
            -e MAIL_SMTP_STARTTLS_ENABLE \
            -e APP_EMAIL_FROM \
            -e APP_EMAIL_VERIFICATION_URL \
            -e APP_EMAIL_VERIFICATION_TOKEN_TTL \
            -e APP_EMAIL_VERIFICATION_RESEND_COOLDOWN \
            -e APP_PASSWORD_RESET_URL \
            -e APP_PASSWORD_RESET_TOKEN_TTL \
            -e APP_PASSWORD_RESET_RESEND_COOLDOWN \
            -e APP_JWT_SECRET \
            -e APP_JWT_ACCESS_TOKEN_TTL \
            -e ALLOWED_ORIGINS \
            -e APP_ADMIN_BOOTSTRAP_ENABLED \
            -e APP_ADMIN_EMAIL \
            -e APP_ADMIN_USERNAME \
            -e APP_ADMIN_PASSWORD \
            -e APP_AI_ENABLED \
            -e APP_AI_API_KEY \
            -e APP_AI_BASE_URL \
            -e APP_AI_MODEL_ID \
            "$APP_IMAGE_NAME:$GITHUB_SHA"

          echo "Application container started on public port 3600"
          docker ps --filter "name=$APP_CONTAINER_NAME"

      - name: Verify deployment
        shell: bash
        run: |
          for i in {1..30}; do
            if ! docker ps --format '{{.Names}}' | grep -qx "$APP_CONTAINER_NAME"; then
              echo "::error::Application container is not running"
              docker logs "$APP_CONTAINER_NAME" || true
              exit 1
            fi

            if docker exec "$APP_CONTAINER_NAME" curl --fail --silent http://localhost:8080/actuator/health >/dev/null; then
              echo "Application health check passed"
              exit 0
            fi

            echo "Attempt $i: waiting for application health..."
            sleep 2
          done

          echo "::error::Application health check did not pass"
          docker logs "$APP_CONTAINER_NAME" || true
          exit 1

      - name: Display application logs
        if: always()
        shell: bash
        run: docker logs --tail 80 "$APP_CONTAINER_NAME" || true
