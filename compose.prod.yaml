name: code-racer-prod

services:
  database:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  app:
    image: ${APP_IMAGE_NAME}:${APP_IMAGE_TAG}
    restart: unless-stopped
    ports:
      - "3600:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - POSTGRES_HOST=database
      - POSTGRES_PORT=5432
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - MAIL_HOST
      - MAIL_PORT
      - MAIL_USERNAME
      - MAIL_PASSWORD
      - MAIL_SMTP_AUTH
      - MAIL_SMTP_STARTTLS_ENABLE
      - APP_EMAIL_FROM
      - APP_EMAIL_VERIFICATION_URL
      - APP_EMAIL_VERIFICATION_TOKEN_TTL
      - APP_EMAIL_VERIFICATION_RESEND_COOLDOWN
      - APP_PASSWORD_RESET_URL
      - APP_PASSWORD_RESET_TOKEN_TTL
      - APP_PASSWORD_RESET_RESEND_COOLDOWN
      - APP_JWT_SECRET
      - APP_JWT_ACCESS_TOKEN_TTL
      - ALLOWED_ORIGINS
      - APP_ADMIN_BOOTSTRAP_ENABLED
      - APP_ADMIN_EMAIL
      - APP_ADMIN_USERNAME
      - APP_ADMIN_PASSWORD
      - APP_AI_ENABLED
      - APP_AI_API_KEY
      - APP_AI_BASE_URL
      - APP_AI_MODEL_ID
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres-data:
    name: code-racer-postgres-data
