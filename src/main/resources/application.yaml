spring:
  application:
    name: code-racer-backend

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:code_racer}
    username: ${POSTGRES_USER:code_racer}
    password: ${POSTGRES_PASSWORD:change-me}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] [correlationId=%X{correlationId}] %logger{36} - %msg%n"

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173}
  security:
    jwt:
      secret: ${APP_JWT_SECRET:}
      access-token-ttl: ${APP_JWT_ACCESS_TOKEN_TTL:15m}
  admin:
    bootstrap:
      enabled: ${APP_ADMIN_BOOTSTRAP_ENABLED:false}
      email: ${APP_ADMIN_EMAIL:}
      username: ${APP_ADMIN_USERNAME:}
      password: ${APP_ADMIN_PASSWORD:}
