spring:
  application:
    name: code-racer-backend

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:code_racer}
    username: ${POSTGRES_USER:code_racer}
    password: ${POSTGRES_PASSWORD:change-me}

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:false}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] [correlationId=%X{correlationId}] %logger{36} - %msg%n"

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173}
  email:
    delivery:
      mode: ${APP_EMAIL_DELIVERY_MODE:smtp}
      from: ${APP_EMAIL_FROM:no-reply@coderacer.local}
  email-verification:
    verification-url: ${APP_EMAIL_VERIFICATION_URL:http://localhost:5173/verify-email}
    token-ttl: ${APP_EMAIL_VERIFICATION_TOKEN_TTL:24h}
    resend-cooldown: ${APP_EMAIL_VERIFICATION_RESEND_COOLDOWN:0s}
  security:
    jwt:
      secret: ${APP_JWT_SECRET:}
      access-token-ttl: ${APP_JWT_ACCESS_TOKEN_TTL:15m}
  admin:
    bootstrap:
      enabled: ${APP_ADMIN_BOOTSTRAP_ENABLED:false}
      email: ${APP_ADMIN_EMAIL:}
      username: ${APP_ADMIN_USERNAME:}
      password: ${APP_ADMIN_PASSWORD:}
