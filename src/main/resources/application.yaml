spring:
  application:
    name: code-racer-backend

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] [correlationId=%X{correlationId}] %logger{36} - %msg%n"

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS}
  email:
    delivery:
      mode: ${APP_EMAIL_DELIVERY_MODE}
      from: ${APP_EMAIL_FROM}
  email-verification:
    verification-url: ${APP_EMAIL_VERIFICATION_URL}
    token-ttl: ${APP_EMAIL_VERIFICATION_TOKEN_TTL}
    resend-cooldown: ${APP_EMAIL_VERIFICATION_RESEND_COOLDOWN}
  password-reset:
    token-ttl: ${APP_PASSWORD_RESET_TOKEN_TTL}
    resend-cooldown: ${APP_PASSWORD_RESET_RESEND_COOLDOWN}
    reset-url: ${APP_PASSWORD_RESET_URL}
  ai:
    enabled: ${APP_AI_ENABLED}
    api-key: ${APP_AI_API_KEY}
    base-url: ${APP_AI_BASE_URL}
    model-id: ${APP_AI_MODEL_ID}
  security:
    jwt:
      secret: ${APP_JWT_SECRET}
      access-token-ttl: ${APP_JWT_ACCESS_TOKEN_TTL}
  admin:
    bootstrap:
      enabled: ${APP_ADMIN_BOOTSTRAP_ENABLED}
      email: ${APP_ADMIN_EMAIL}
      username: ${APP_ADMIN_USERNAME}
      password: ${APP_ADMIN_PASSWORD}
